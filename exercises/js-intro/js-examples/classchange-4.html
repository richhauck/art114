<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Class Change</title>
    <style>
        .alertcolor{color:red;}
    </style>
    <script src="jquery-2.1.4.min.js"></script>
    <script>
      $(document).ready(function() {

        $('#link1').mouseup(function(){
            $('#p1').addClass('alertcolor');
        });

      });
    </script>
  </head>
  <body>
      <a id="link1" href="#">Change Color</a>
      <p id="p1">Hello.</p>
  </body>
</html>
