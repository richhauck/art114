<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Flexbox Flex Grow</title>
  <style>
    .wrapper{
      margin:10px 0;
      display:flex;
      background-color: lightgray;
    }
    .wrapper div{
      background-color: white;
      margin:10px;
      flex-grow:1;
    }
    .wrapper div.big{
      flex-grow:2;
    }
  </style>
</head>
<body>
  <div class="wrapper">
    <div>1</div>
    <div>2</div>
    <div class="big">3</div>
    <div>4</div>
    <div>5</div>
  </div>
</body>
</html>
