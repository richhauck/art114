<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Inline Flexbox</title>
  <style>
    .wrapper{
      display:flex;
      background-color: lightgray;
      margin:10px 0;
      height:200px;
    }
    .wrapper div{
      background-color: white;
      margin:10px;
      padding:20px;
    }
    .wrapper.align-start{
      align-items:flex-start;
    }
    .wrapper.align-items{
      align-items: center;
    }
    .wrapper.align-end{
      align-items:flex-end;
    }
  </style>
</head>
<body>
  <p>align-items:flex-start;</p>
  <div class="wrapper align-start">
    <div>1</div>
    <div>2</div>
    <div>3</div>
    <div>4</div>
    <div>5</div>
  </div>
  <p>align-items: center;</p>
  <div class="wrapper align-items">
    <div>1</div>
    <div>2</div>
    <div>3</div>
    <div>4</div>
    <div>5</div>
  </div>
  <p>align-items:flex-end;</p>
  <div class="wrapper align-end">
    <div>1</div>
    <div>2</div>
    <div>3</div>
    <div>4</div>
    <div>5</div>
  </div>
</body>
</html>
