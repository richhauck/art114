<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Flexbox Flex Wrap</title>
  <style>
    .wrapper{
      margin:10px 0;
      width:300px;
      display:flex;
      background-color: lightgray;
    }
    .wrapper div{
      background-color: white;
      margin:10px;
      margin:10px;
      padding:20px;
      width:20px;
    }
    .wrapper.wrap{
      flex-wrap: wrap;
    }
    .wrapper.wrap-reverse{
      flex-wrap: wrap-reverse;
    }
  </style>
</head>
<body>
  <p>flex-wrap: nowrap;</p>
  <div class="wrapper">
    <div>1</div>
    <div>2</div>
    <div>3</div>
    <div>4</div>
    <div>5</div>
  </div>

  <p>flex-wrap: wrap;</p>
  <div class="wrapper wrap">
    <div>1</div>
    <div>2</div>
    <div>3</div>
    <div>4</div>
    <div>5</div>
  </div>

  <p>flex-wrap: wrap-reverse;</p>
  <div class="wrapper wrap-reverse">
    <div>1</div>
    <div>2</div>
    <div>3</div>
    <div>4</div>
    <div>5</div>
  </div>
</body>
</html>
