<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Row Reverse Flexbox</title>
  <style>
    .wrapper{
      display:flex;
      flex-direction:row-reverse;
      background-color: lightgray;
    }
    .wrapper div{
      background-color: white;
      margin:10px;
      padding:20px;
    }
  </style>
</head>
<body>
  .container {
  flex-direction: row | row-reverse | column | column-reverse;
}
  <div class="wrapper row">
    <div>1</div>
    <div>2</div>
    <div>3</div>
    <div>4</div>
    <div>5</div>
  </div>

  <div class="wrapper row-reverse">
    <div>1</div>
    <div>2</div>
    <div>3</div>
    <div>4</div>
    <div>5</div>
  </div>

  <div class="wrapper column">
    <div>1</div>
    <div>2</div>
    <div>3</div>
    <div>4</div>
    <div>5</div>
  </div>

  <div class="wrapper column-reverse">
    <div>1</div>
    <div>2</div>
    <div>3</div>
    <div>4</div>
    <div>5</div>
  </div>

</body>
</html>
