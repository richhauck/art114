<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Inline Flexbox</title>
  <style>
    .wrapper{
      margin:10px 0;
      display:flex;
      background-color: lightgray;
    }
    .wrapper.inline{
      display:inline-flex;
    }
    .wrapper div{
      background-color: white;
      margin:10px;
      padding:20px;
    }
  </style>
</head>
<body>
  <div class="wrapper">
    <div>1</div>
    <div>2</div>
    <div>3</div>
    <div>4</div>
    <div>5</div>
  </div>

  <div class="wrapper inline">
    <div>1</div>
    <div>2</div>
    <div>3</div>
    <div>4</div>
    <div>5</div>
  </div>
</body>
</html>
