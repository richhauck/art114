<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Webcomponents</title>
</head>
<body>
   <p><a href="http://www.html5rocks.com/en/tutorials/webcomponents/shadowdom/">HTML5Rocks tutorial</a></p>
   <div id="nameTag">Bob</div>

<template id="nameTagTemplate">
<style>
.outer {
  border: 10px solid red;
  border-radius: 1em;
  font-size: 20px;
  width: 12em;
  height: 7em;
  text-align: center;
  font-family: sans-serif;
  font-weight: bold;
  background-color: lightgray;
}
.name {
  font-size: 45pt;
  font-weight: normal;
  margin-top: 0.8em;
  padding-top: 0.2em;
}
</style>
<div class="outer">
  <div class="name">
    <content></content>
  </div>
</div>
</template>

<script>
var shadow = document.querySelector('#nameTag').createShadowRoot();
var template = document.querySelector('#nameTagTemplate');
var clone = document.importNode(template.content, true);
shadow.appendChild(clone);
</script>

</body>
</html>
