<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Off-Canvas Menu</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        body{
            padding: 0;
            margin: 0;
        }
        main{
            width: 100%;
        }
        .nav-toggle, .close-btn{display: none;}
        .close-btn{float: right;}
        #site-canvas {
          display: flex;
          width: 100%;
          height: 100%;
          position: relative;
          transform: translateX(0);
          transform: translate3d(0, 0, 0);
          transition: 300ms ease all;
          backface-visibility: hidden;
          background-color: #ddd;
        }
        #content{
            background-color: #999;
            width: calc(100% - 300px);
        }
        #site-panel {
          width: 300px;
          position: relative;
          background: #ccc;
        }

        @media (max-width: 767px) {
            .nav-toggle, .close-btn{display: block;}
            .show-nav #site-canvas {
              transform: translateX(300px);
              transform: translate3d(300px, 0, 0);
            }
            #content{
                width: 100%;
            }
            #site-panel {
              position: absolute;
              top: 0;
              left: -300px;
            }
            #site-panel .nav-toggle{
                position: absolute;
                right: 1em;
                top: 1em;
            }

        }
    </style>
</head>
<body>
    <button class="nav-toggle">&#9776; MENU</button>

    <main>
        <div id="site-canvas">
            <div id="site-panel">
               <button class="close-btn" href="#">X</button>
                <p>Panel</p>
            </div>

            <div id="content">
                <p>Content</p>
            </div>
        </div>
    </main>

   <script>
        document.querySelector('.nav-toggle').addEventListener('click', function(){
            document.body.classList.toggle('show-nav');
        });
        document.querySelector('.close-btn').addEventListener('click', function(){
            document.body.classList.toggle('show-nav');
        });
    </script>
</body>
</html>
